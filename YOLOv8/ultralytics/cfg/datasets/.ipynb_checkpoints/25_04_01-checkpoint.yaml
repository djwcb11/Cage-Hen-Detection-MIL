path: ../ultralytics/cfg/datasets/dataset_25_04_01
train: images/train
val: images/val
test: images/test
nc: 1
names: ["head"]
augment:
  degrees: 0.0 # 图像旋转角度
  translate: 0.1 # 平移比例
  scale: 0.5 # 缩放比例
  shear: 0.0 # 错切角度
  perspective: 0.0 # 透视变换比例
  flipud: 0.0 # 上下翻转概率
  fliplr: 0.5 # 左右翻转概率
  mosaic: 1.0 # Mosaic 数据增强概率
  mixup: 0.0 # MixUp 数据增强概率
  copy_paste: 0.0 # Copy-Paste 数据增强概率